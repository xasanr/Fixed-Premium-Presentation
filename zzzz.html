<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Premium Presentation</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#f10c0c,#881863,#2c5364);
  color:#ffffff;
}

.container{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:25%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:40px;
  box-sizing:border-box;
}

.menu-item{
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s ease;
  background:rgba(255,255,255,0.1);
}

.menu-item:hover{
  background:rgba(255,255,255,0.2);
  transform:translateX(6px);
}

.menu-item.active{
  background:#00c6ff;
  color:#000;
  font-weight:bold;
}

/* CONTENT */
.content{
  width:75%;
  position:relative;
  overflow:hidden;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transform:translateX(100%);
  transition:0.6s ease;
}

.slide.active{
  opacity:1;
  transform:translateX(0);
}

.slide.prev{
  transform:translateX(-100%);
}

.card{
  width:70%;
  padding:35px;
  border-radius:18px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  box-shadow:0 30px 60px rgba(0,0,0,0.5);
}

.progress{
  position:fixed;
  bottom:0;
  left:0;
  height:5px;
  background:#00c6ff;
  width:0%;
  transition:0.4s;
}

/* RESPONSIVE */
@media(max-width:900px){
  .container{flex-direction:column;}
  .sidebar{width:100%;display:flex;padding:15px;}
  .menu-item{flex:1;margin:5px;text-align:center;}
  .content{width:100%;}
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <div class="menu-item active" onclick="go(0)">Introduction</div>
    <div class="menu-item" onclick="go(1)">Problem</div>
    <div class="menu-item" onclick="go(2)">Solution</div>
    <div class="menu-item" onclick="go(3)">Market</div>
  </div>

  <div class="content">
    <div class="slide active">
      <div class="card">
        <h2>Introduction</h2>
        <p>Loyiha haqida kirish qismi.</p>
      </div>
    </div>

    <div class="slide">
      <div class="card">
        <h2>Problem</h2>
        <p>Mavjud muammo tavsifi.</p>
      </div>
    </div>

    <div class="slide">
      <div class="card">
        <h2>Solution</h2>
        <p>Taklif qilinayotgan yechim.</p>
      </div>
    </div>

    <div class="slide">
      <div class="card">
        <h2>Market</h2>
        <p>Bozor va imkoniyatlar.</p>
      </div>
    </div>
  </div>

</div>

<div class="progress" id="bar"></div>

<script>
let slides=document.querySelectorAll(".slide");
let menu=document.querySelectorAll(".menu-item");
let bar=document.getElementById("bar");
let current=0;
let auto;

function updateUI(){
  slides.forEach((slide,i)=>{
    slide.classList.remove("active","prev");
    if(i===current) slide.classList.add("active");
    if(i<current) slide.classList.add("prev");
  });

  menu.forEach((item,i)=>{
    item.classList.toggle("active",i===current);
  });

  bar.style.width=((current+1)/slides.length*100)+"%";
}

function go(i){
  current=i;
  updateUI();
  resetAuto();
}

function next(){
  current++;
  if(current>=slides.length) current=0;
  updateUI();
}

function startAuto(){
  auto=setInterval(next,6000);
}

function resetAuto(){
  clearInterval(auto);
  startAuto();
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") next();
  if(e.key==="ArrowLeft"){
    current--;
    if(current<0) current=slides.length-1;
    updateUI();
  }
});

startAuto();
</script>

</body>
</html>
